<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Plan Monitoring</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Supabase integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="app.js"></script>

    <!-- Fullscreen Chart Modal (Premium Upgrade) -->
    <div class="modal fade premium-modal" id="chartModal" tabindex="-1" aria-hidden="true" style="z-index: 2000;">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content border-0">
                <div class="modal-header glass-header-dark py-4 px-5 align-items-center" style="border-radius: 0;">
                    <h4 class="modal-title fw-bold" id="chartModalTitle" style="font-family: 'Outfit', sans-serif;">
                        Chart Analysis</h4>
                    <div class="d-flex align-items-center gap-4">
                        <span class="small fw-medium opacity-75"><i class="bi bi-info-circle me-1 text-warning"></i>
                            Scroll to zoom, Drag to pan</span>
                        <button type="button" class="btn-close btn-close-white opacity-75" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                </div>
                <div class="modal-body p-5 bg-white d-flex align-items-center justify-content-center"
                    style="background-image: radial-gradient(#F1F5F9 1.5px, transparent 1.5px); background-size: 30px 30px;">
                    <div id="chartModalContainer" class="animate-entry" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Regional Executive Modal -->
    <div class="modal fade premium-modal" id="regionalExecModal" tabindex="-1" aria-hidden="true"
        style="z-index: 1060;">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0">
                <div class="modal-header glass-header-dark py-3 px-4 align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-white/10 rounded-3 p-2 d-flex align-items-center justify-content-center"
                            style="width:48px;height:48px;backdrop-filter:blur(4px);">
                            <i class="bi bi-geo-alt-fill text-warning fs-4"></i>
                        </div>
                        <div>
                            <h5 class="modal-title fw-bold mb-0 text-white" id="regionalExecTitle"
                                style="font-family: 'Outfit', sans-serif; letter-spacing: -0.5px;">Regional Briefing
                            </h5>
                            <div class="small text-white/70" id="regionalExecSubtitle">Strategic Overview</div>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white opacity-75 hover-opacity-100 transition-all"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    <!-- Dynamic Content Injected Here -->
                    <div id="regionalExecBody"></div>
                </div>
                <div class="modal-footer justify-content-between bg-white border-top-0 py-3 px-4">
                    <div class="small text-muted"><i class="bi bi-info-circle me-1"></i> Data updated for current wave
                    </div>
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4"
                        data-bs-dismiss="modal">Close Briefing</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
